format = """
$hostname \
$username \
$directory \
$git_branch \
$git_status \
$fill \
$golang \
$nodejs \
$rust \
$python \
$dotnet \
$terraform \
$docker_context \
$kubernetes \
$shell \
$status \
$time \
$line_break \
${custom.familiar} \
[уұһӘ](fg:iris) """

palette = "tokyonight_night"

[custom.familiar]
command = "$HOME/bin/familiar prompt"
when = "true"
format = "[$output ](fg:#c4a7e7)"
shell = ["bash", "--noprofile", "--norc"]

[palettes.tokyonight_night]
overlay = "#393552"
love = "#eb6f92"
gold = "#f6c177"
rose = "#ea9a97"
pine = "#3e8fb0"
foam = "#9ccfd8"
iris = "#c4a7e7"

[directory]
format = "[оӮ¶](fg:overlay)[ $path ]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:pine"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
Documents = "у°Ҳҷ"
Downloads = "пҖҷ"
Music = "пҖҒ"
Pictures = "пҖҫ"
nvim = "пҚҜ"

[fill]
style = "fg:overlay"
symbol = " "

[git_branch]
format = "[оӮ¶](fg:overlay)[ $symbol $branch ]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:foam"
symbol = "пҗҳ"

[git_status]
disabled = false
style = "bg:overlay fg:love"
format = '[оӮ¶](fg:overlay)([$all_status$ahead_behind]($style))[оӮҙ](fg:overlay) '
up_to_date = '[ вң“ ](bg:overlay fg:iris)'
untracked = '[?\($count\)](bg:overlay fg:gold)'
stashed = '[\$](bg:overlay fg:iris)'
modified = '[!\($count\)](bg:overlay fg:gold)'
renamed = '[В»\($count\)](bg:overlay fg:iris)'
deleted = '[вңҳ\($count\)](style)'
staged = '[++\($count\)](bg:overlay fg:gold)'
ahead = '[вҮЎ\(${count}\)](bg:overlay fg:foam)'
diverged = 'вҮ•[\[](bg:overlay fg:iris)[вҮЎ\(${ahead_count}\)](bg:overlay fg:foam)[вҮЈ\(${behind_count}\)](bg:overlay fg:rose)[\]](bg:overlay fg:iris)'
behind = '[вҮЈ\(${count}\)](bg:overlay fg:rose)'

[username]
disabled = false
format = "[оӮ¶](fg:overlay)[ о·… $user ]($style)[оӮҙ](fg:overlay)"
show_always = true
style_root = "bg:overlay fg:iris"
style_user = "bg:overlay fg:iris"

[hostname]
ssh_only = true
format = "[оӮ¶](fg:overlay)[ рҹ–Ҙ $hostname ]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:gold"

[time]
disabled = false
format = "[оӮ¶](fg:overlay)[ $time ]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:rose"
time_format = "%I:%M%P"
use_12hr = false

# Languages

[golang]
format = "[оӮ¶](fg:overlay)[$symbol$version]($style)[оӮҙ](fg:overlay) "
style = "bg:overlay fg:pine"
disabled = false
symbol = "оҳ§ "

[nodejs]
style = "bg:overlay fg:pine"
format = "[оӮ¶](fg:overlay)[$symbol$version]($style)[оӮҙ](fg:overlay) "
disabled = false
symbol = "оҙҚ "

[rust]
style = "bg:overlay fg:pine"
format = "[оӮ¶](fg:overlay)[$symbol$version]($style)[оӮҙ](fg:overlay) "
disabled = false
symbol = "оһЁ"

[python]
style = "bg:overlay fg:pine"
symbol = "оңј "
format = "[оӮ¶](fg:overlay)[$symbol$version(\\($virtualenv\\))]($style)[оӮҙ](fg:overlay) "
disabled = false
detect_files = [
  "pyproject.toml",
  "requirements.txt",
  "Pipfile",
  ".python-version",
  ".venv",
]

[dotnet]
style = "bg:overlay fg:pine"
format = "[оӮ¶](fg:overlay)[$symbol$version]($style)[оӮҙ](fg:overlay) "
disabled = false
detect_extensions = ["csproj", "fsproj", "xproj", "sln"]
symbol = "оқҝ "

[terraform]
format = "[оӮ¶](fg:overlay)[$symbol$version]($style)[оӮҙ](fg:overlay) "
style = "bg:overlay fg:foam"
disabled = false
symbol = "оҡҡ "

[docker_context]
format = "[оӮ¶](fg:overlay)[рҹҗі $context](bg:overlay fg:iris)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:iris"
disabled = false
only_with_files = true

[kubernetes]
format = "[оӮ¶](fg:overlay)[$symbol$context( \\($namespace\\))]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:rose"
disabled = false
symbol = "вҳё "
detect_files = [".kube/config", ".kube"]

[shell]
format = "[оӮ¶](fg:overlay)[оһ• $indicator]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:gold"
disabled = false

[status]
format = '[оӮ¶](fg:overlay)[ $symbol ]($style)[оӮҙ](fg:overlay)'
style = 'bg:overlay fg:love'
symbol = 'вңҳ'
success_symbol = 'вң”'
disabled = false
